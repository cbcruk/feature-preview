name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deployment at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Base must match the project-pages path (https://<user>.github.io/<repo>/).
      - name: Build demo
        run: pnpm exec vp build --base=/${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
